<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>婚礼邀请海报</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .tip { color: rgba(255,255,255,.45); font-size: 13px; margin-bottom: 16px; font-family: sans-serif; }

    .poster {
      width: 420px; height: 796px;
      background: #0C0C0C;
      position: relative; overflow: hidden;
      font-family: 'PingFang SC','Microsoft YaHei', sans-serif;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    /* 顶部婚纱照 */
    .photo-area {
      width: 100%; height: 390px;
      position: relative; overflow: hidden;
    }
    .photo-area img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 15%;
      display: block;
    }
    .photo-fade {
      position: absolute; top: 0; left: 0; right: 0; height: 410px;
      background: linear-gradient(to bottom, rgba(12,12,12,0) 0%, rgba(12,12,12,0) 45%, rgba(12,12,12,0.4) 65%, rgba(12,12,12,0.85) 82%, rgba(12,12,12,1) 95%);
      z-index: 1;
      pointer-events: none;
    }

    /* 内容区 */
    .content {
      position: relative; z-index: 2;
      padding: 0 36px;
      text-align: center;
      color: #fff;
      margin-top: -16px;
    }

    .names {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 30px; font-weight: 500;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    /* 装饰分隔 */
    .ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 10px;
      color: rgba(255,255,255,.25);
      font-size: 12px; letter-spacing: .2em;
    }
    .ornament::before, .ornament::after {
      content: ''; width: 40px; height: 1px;
      background: rgba(255,255,255,.15);
    }

    .subtitle {
      font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,.55);
      letter-spacing: .14em;
      margin-bottom: 20px;
    }

    /* 日期区域 - 加边框突出 */
    .date-block {
      border: 1px solid rgba(255,255,255,.12);
      padding: 14px 24px;
      margin: 0 auto 18px;
      display: inline-block;
    }
    .date {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 30px; font-weight: 400;
      letter-spacing: .08em;
      margin-bottom: 2px;
    }
    .time {
      font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,.5);
      letter-spacing: .1em;
    }

    .venue {
      font-size: 14px; font-weight: 400;
      color: rgba(255,255,255,.75);
      margin-bottom: 3px;
    }

    .address {
      font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,.35);
      margin-bottom: 18px;
    }

    /* 二维码 */
    .qr-wrap {
      display: flex; align-items: center; justify-content: center; gap: 14px;
    }
    .qr-box {
      background: #fff; border-radius: 4px;
      padding: 5px; flex-shrink: 0;
    }
    .qr-box img { width: 68px; height: 68px; display: block; }
    .qr-info {
      text-align: left;
    }
    .qr-info-main {
      font-size: 12px; color: rgba(255,255,255,.5);
      letter-spacing: .04em; margin-bottom: 2px;
    }
    .qr-info-sub {
      font-size: 10px; color: rgba(255,255,255,.25);
      letter-spacing: .02em;
    }

    /* 底部 */
    .footer-line {
      position: absolute; bottom: 14px; left: 0; right: 0;
      text-align: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 9px; color: rgba(255,255,255,.15);
      letter-spacing: .16em; text-transform: uppercase;
    }

    .save-btn {
      margin-top: 16px; padding: 10px 32px;
      font-size: 14px; font-family: sans-serif;
      background: #fff; color: #0C0C0C; border: none;
      cursor: pointer; letter-spacing: .06em;
    }
    .save-btn:hover { background: #eee; }
  </style>
</head>
<body>
  <div class="tip">右键海报 → 另存为图片，或点击下方按钮保存</div>

  <div class="poster" id="poster">
    <div class="photo-area">
      <img src="https://wedding-invitation-1255599566.cos.ap-guangzhou.myqcloud.com/images/DSCF7224-web.jpg" crossorigin="anonymous" alt="婚纱照">
    </div>
    <div class="photo-fade"></div>

    <div class="content">
      <div class="names">王峰 & 杨丽琴</div>
      <div class="ornament">✦</div>
      <div class="subtitle">我们诚挚邀请您见证爱情</div>

      <div class="date-block">
        <div class="date">05 · 04 · 2026</div>
        <div class="time">星期一 · 中午 12:08</div>
      </div>

      <div class="venue">新城宴 · 3楼D厅（新城华府店）</div>
      <div class="address">武汉市新洲区邾城街龙腾大道新城华府A4号楼</div>

      <div class="qr-wrap">
        <div class="qr-box">
          <img id="qr" alt="扫码查看邀请函" crossorigin="anonymous">
        </div>
        <div class="qr-info">
          <div class="qr-info-main">扫码查看电子邀请函</div>
          <div class="qr-info-sub">RSVP · 祝福留言 · 婚礼详情</div>
        </div>
      </div>
    </div>

    <div class="footer-line">W & Y · Wedding Invitation · 2026</div>
  </div>

  <button class="save-btn" id="saveBtn">保存为图片</button>

  <script>
    document.getElementById('qr').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='
      + encodeURIComponent('https://wfnein.github.io/wedding/')
      + '&margin=0';

    document.getElementById('saveBtn').addEventListener('click', async () => {
      if (!window.html2canvas) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        document.head.appendChild(s);
        await new Promise(r => s.onload = r);
      }
      // html2canvas 不支持 object-fit，手动计算 cover 定位
      const img = document.querySelector('.photo-area img');
      const container = document.querySelector('.photo-area');
      const cw = container.offsetWidth, ch = container.offsetHeight;
      const nw = img.naturalWidth, nh = img.naturalHeight;
      const scale = Math.max(cw / nw, ch / nh);
      const sw = nw * scale, sh = nh * scale;
      // object-position: center 15%
      const left = (cw - sw) / 2;
      const top = (ch - sh) * 0.15;
      // 临时移除 object-fit，用绝对定位模拟
      img.style.objectFit = 'none';
      img.style.width = sw + 'px';
      img.style.height = sh + 'px';
      img.style.left = left + 'px';
      img.style.top = top + 'px';

      const canvas = await html2canvas(document.getElementById('poster'), {
        scale: 3,
        useCORS: true,
        backgroundColor: '#0C0C0C'
      });

      // 恢复样式
      img.style.objectFit = 'cover';
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.left = '0';
      img.style.top = '0';

      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = '王峰与杨丽琴婚礼邀请函.png';
      a.click();
    });
  </script>
</body>
</html>
