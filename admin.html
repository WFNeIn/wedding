<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回执管理 · 王峰 & 杨丽琴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--text:#0C0C0C;--sec:#53565A;--rule:#E7E7E7;--accent:#2361FF;--sans:'Libre Franklin','PingFang SC','Microsoft YaHei',sans-serif;--serif:'Playfair Display',Georgia,serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--sans);font-weight:300;color:var(--text);background:#FAFAFA;line-height:1.75;letter-spacing:.02em;-webkit-font-smoothing:antialiased}
    .wrap{max-width:800px;margin:0 auto;padding:60px 24px 40px}
    h1{font-family:var(--serif);font-size:28px;font-weight:500;margin-bottom:8px}
    .summary{color:var(--sec);font-size:15px;margin-bottom:32px}
    .summary span{color:var(--text);font-weight:500}
    .card{background:#fff;border:1px solid var(--rule);padding:20px 24px;margin-bottom:16px;transition:box-shadow .2s}
    .card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .card-name{font-size:18px;font-weight:500}
    .card-time{font-size:13px;color:var(--sec)}
    .card-info{font-size:14px;color:var(--sec);line-height:1.8}
    .card-msg{margin-top:8px;font-size:14px;font-style:italic;color:var(--text);border-left:2px solid var(--rule);padding-left:12px}
    .empty{text-align:center;padding:80px 0;color:var(--sec);font-size:16px}
    .actions{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
    .btn{padding:8px 20px;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--text);background:transparent;color:var(--text);cursor:pointer;transition:all .2s}
    .btn:hover{background:var(--text);color:#fff}
    .btn-danger{border-color:#c0392b;color:#c0392b}
    .btn-danger:hover{background:#c0392b;color:#fff}
    a.back{display:inline-block;font-size:13px;color:var(--accent);letter-spacing:.06em;margin-bottom:24px}
    /* 密码遮罩 */
    .auth-ov{position:fixed;inset:0;background:#FAFAFA;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .auth-ov.hide{display:none}
    .auth-ov h2{font-family:var(--serif);font-size:22px;font-weight:500;margin-bottom:20px}
    .auth-ov input{width:240px;padding:10px 0;font-family:var(--sans);font-size:16px;border:none;border-bottom:1px solid var(--rule);background:transparent;text-align:center;outline:none;transition:border-color .3s}
    .auth-ov input:focus{border-color:var(--text)}
    .auth-ov .auth-btn{margin-top:20px;padding:10px 32px;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:1.5px solid var(--text);background:transparent;color:var(--text);cursor:pointer;transition:all .2s}
    .auth-ov .auth-btn:hover{background:var(--text);color:#fff}
    .auth-ov .auth-err{color:#c0392b;font-size:13px;margin-top:12px;height:18px}
  </style>
</head>
<body>
  <!-- 密码验证 -->
  <div class="auth-ov" id="authOv">
    <h2>管理员验证</h2>
    <input type="password" id="authPwd" placeholder="请输入密码" autofocus>
    <button class="auth-btn" id="authBtn">进入</button>
    <div class="auth-err" id="authErr"></div>
  </div>

  <div class="wrap" id="mainContent" style="display:none">
    <a class="back" href="index.html">← 返回请帖</a>
    <h1>出席回执</h1>
    <div class="summary" id="summary"></div>
    <div class="actions">
      <button class="btn" id="exportBtn">导出 CSV</button>
      <button class="btn btn-danger" id="clearBtn">清空数据</button>
    </div>
    <div id="list"></div>
  </div>
  <script>
    /* ===== 密码验证 ===== */
    const ADMIN_PWD = '0504';  // 改成你想要的密码
    const authOv = document.getElementById('authOv');
    const authPwd = document.getElementById('authPwd');
    const authErr = document.getElementById('authErr');
    const mainContent = document.getElementById('mainContent');

    // 检查是否已验证过（当前会话）
    if (sessionStorage.getItem('admin_auth') === '1') {
      authOv.classList.add('hide');
      mainContent.style.display = '';
    }

    document.getElementById('authBtn').addEventListener('click', checkPwd);
    authPwd.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkPwd(); });

    function checkPwd() {
      if (authPwd.value === ADMIN_PWD) {
        sessionStorage.setItem('admin_auth', '1');
        authOv.classList.add('hide');
        mainContent.style.display = '';
        render();
      } else {
        authErr.textContent = '密码错误';
        authPwd.value = '';
        authPwd.focus();
      }
    }
    const COS_GET = 'https://wedding-invitation-1255599566.cos.ap-guangzhou.myqcloud.com/data/rsvp.json';
    const COS_PUT = 'https://wedding-invitation-1255599566.cos.ap-guangzhou.myqcloud.com/data/rsvp.json';
    let rsvpData = [];

    async function load() {
      try {
        const res = await fetch(COS_GET);
        rsvpData = res.ok ? await res.json() : [];
      } catch (_) {
        rsvpData = JSON.parse(localStorage.getItem('wedding_rsvp') || '[]');
      }
      return rsvpData;
    }
    async function render() {
      const data = await load();
      const total = data.reduce((s, d) => s + Number(d.count || 1), 0);
      document.getElementById('summary').innerHTML =
        `共 <span>${data.length}</span> 条回执，预计出席 <span>${total}</span> 人`;
      const listEl = document.getElementById('list');
      if (!data.length) {
        listEl.innerHTML = '<div class="empty">暂无回执数据</div>';
        return;
      }
      listEl.innerHTML = data.slice().reverse().map((d) => `
        <div class="card">
          <div class="card-head">
            <span class="card-name">${esc(d.name)}</span>
            <span class="card-time">${esc(d.time || '')}</span>
          </div>
          <div class="card-info">
            电话：${esc(d.phone || '未填写')} &nbsp;|&nbsp; 人数：${esc(d.count || '1')} 人
          </div>
          ${d.message ? `<div class="card-msg">"${esc(d.message)}"</div>` : ''}
        </div>
      `).join('');
    }
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    // 导出 CSV
    document.getElementById('exportBtn').addEventListener('click', () => {
      const data = rsvpData;
      if (!data.length) return alert('暂无数据');
      const header = '姓名,电话,人数,祝福,提交时间\n';
      const rows = data.map(d =>
        [d.name, d.phone, d.count, d.message, d.time].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')
      ).join('\n');
      const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `回执数据_${new Date().toLocaleDateString('zh-CN')}.csv`;
      a.click();
    });
    // 清空
    document.getElementById('clearBtn').addEventListener('click', async () => {
      if (confirm('确定要清空所有回执数据吗？此操作不可恢复。')) {
        try {
          await fetch(COS_PUT, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: '[]',
          });
        } catch (_) {
          localStorage.removeItem('wedding_rsvp');
        }
        render();
      }
    });
    render();
  </script>
</body>
</html>
